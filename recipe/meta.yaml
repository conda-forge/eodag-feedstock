{% set name = "eodag" %}
{% set version = "4.3.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/eodag-{{ version }}.tar.gz
  sha256: fab6a940921c97c76e12176be430a7d1bd0654db46ac5a55f973c49a0b56038a

build:
  number: 0
  entry_points:
    - eodag = eodag.cli:eodag

requirements:
  host:
    - python >=3.9

outputs:
  - name: eodag
    build:
      noarch: python
      script: python -m pip install . -vv
    requirements:
      host:
        - pip >=19.3
        - python {{ python_min }}
        - setuptools >=45
        - setuptools_scm >=6.2
      run:
        - annotated-types
        - boto3
        - botocore
        - click
        - ecmwf-api-client
        - geojson
        - importlib-metadata >=5.0
        - jsonpath-ng <1.8.0
        - lxml
        - orjson
        - OWSLib >=0.27.1
        - pydantic >=2.1.0
        - pydantic-core
        - PyJWT[crypto] >=2.5.0
        - pyproj >=2.1.0
        - pyshp
        - pystac >=1.0.0b1
        - python >={{ python_min }}
        - python-dateutil
        - PyYAML
        - requests
        - shapely >=2.0.6
        - stac-pydantic
        - tqdm
        - typing_extensions >=4.8.0
        - urllib3
        - usgs >=0.3.6
        - zipstream-ng
    test:
      imports:
        - eodag
        - eodag.api
      commands:
        - pip check
        - eodag --help
      requires:
        - pip
        - python {{ python_min }}

about:
  home: https://github.com/CS-SI/eodag
  summary: Earth Observation Data Access Gateway
  license: Apache-2.0
  license_file: LICENSE
  description: |
    EODAG (Earth Observation Data Access Gateway) is a command line tool and a plugin-oriented Python
    framework for searching, aggregating results and downloading remote sensed images while offering
    a unified API for data access regardless of the data provider.
  doc_url: https://eodag.readthedocs.io
  dev_url: https://github.com/CS-SI/eodag

extra:
  recipe-maintainers:
    - maximlt
    - sbrunato
